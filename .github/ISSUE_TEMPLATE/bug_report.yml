name: Bug Report
description: Report a bug with the Voice Satellite integration
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Before submitting, please go through the checklist below to make sure the issue isn't a configuration problem.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites checklist
      description: Please confirm you've checked all of these before opening an issue.
      options:
        - label: I am accessing Home Assistant over **HTTPS** (or localhost). Microphone access requires a secure context.
          required: true
        - label: I have granted **microphone permission** when prompted by the browser (a user gesture like tapping the mic button is required to trigger the permission prompt; in **Fully Kiosk**, enable **Web Content Settings → Enable Microphone Access** and **Autoplay Audio**; in **Home Assistant Companion App**, enable **Settings → Companion App → Autoplay Videos**)
          required: true
        - label: I have added at least one device via **Settings > Devices & Services > Add Integration > Voice Satellite**.
          required: true
        - label: I have selected the correct `assist_satellite.*` entity in the Voice Satellite panel.
          required: true
        - label: "I have wake word detection configured: either **On Device** (default, no server-side setup needed) or **Home Assistant** mode with wake word detection enabled in my Assist pipeline (Settings → Voice assistants → pipeline → ⋮ three-dot menu)."
          required: true
        - label: My Assist pipeline has **Speech-to-Text** (e.g., Whisper) and **Text-to-Speech** (e.g., Piper) configured.
          required: true
        - label: I have confirmed my **Assist pipeline** works independently (e.g., via the Assist dialog in the HA sidebar).
          required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what's happening.
      placeholder: "Timers don't appear on screen after saying 'set a timer for 5 minutes'..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Please provide the following details.
      value: |
        - Home Assistant version:
        - Voice Satellite version:
        - Browser / app:
        - Device (tablet model, phone, desktop):
        - Assist pipeline (name or configuration):
        - Conversation agent (e.g., HA default, OpenAI, Google Generative AI):
    validations:
      required: true

  - type: textarea
    id: diagnostics-report
    attributes:
      label: Diagnostics report
      description: |
        Open the **Voice Satellite** sidebar panel on the affected device, scroll to **Diagnostics & troubleshooting**, click **Run diagnostics**, then click **Copy report** and paste the result here. The report captures browser environment, pipeline configuration, mixed-content URL state, wake word mode, and the card/integration versions. This replaces the older "paste debug logs" workflow and usually contains enough information to reproduce or rule out the most common setup issues.
      render: markdown
    validations:
      required: true

  - type: textarea
    id: entity-state
    attributes:
      label: Entity state and attributes
      description: |
        Go to Developer Tools > States, find your `assist_satellite.*` entity, and paste its state and attributes here. This helps diagnose state sync, timer, and configuration issues.
      render: yaml
